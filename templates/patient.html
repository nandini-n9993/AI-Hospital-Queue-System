<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<h2>Patient Form</h2>

<form method="POST">
<input name="name" placeholder="Name" required>
<input name="age" placeholder="Age" required>
<textarea name="symptoms" placeholder="Symptoms" required></textarea>
<button>Submit</button>
</form>

{% if success %}
<h3>Assigned: {{ specialist }} (Priority: {{ priority }})</h3>
{% endif %}

<h3>Pending Patients</h3>
<table>
<tr><th>Name</th><th>Doctor</th><th>Status</th></tr>
{% for p in patients %}
<tr>
<td>{{ p.name }}</td>
<td>{{ p.doctor }}</td>
<td>{% if p.done %}Done{% else %}Waiting{% endif %}</td>
</tr>
{% endfor %}
</table>

<a href="/">Home</a>
</div>

</body>
</html>
