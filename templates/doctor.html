<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Doctor Dashboard</h2>

{% if grouped %}

    {% for doc in grouped %}
    <div class="card">

        <h3>{{ doc }}</h3>

        <table>
        <tr>
            <th>Name</th>
            <th>Symptoms</th>
            <th>Action</th>
        </tr>

        {% for p in grouped[doc] %}
        <tr>
            <td>{{ p.get('name', 'N/A') }}</td>
            <td>{{ p.get('symptoms', 'N/A') }}</td>
            <td>
                <a href="/complete/{{ p.get('id', 0) }}">
                    <button>Done</button>
                </a>
            </td>
        </tr>
        {% endfor %}

        </table>

    </div>
    {% endfor %}

{% else %}
<p>No patients available</p>
{% endif %}

<a href="/">Home</a>

</div>

</body>
</html>
